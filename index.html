<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeachSpot — Find Beach Parking Faster</title>
<meta name="description" content="Real-time beach parking availability, crowdsourced by beachgoers along the Grand Strand.">
<meta name="theme-color" content="#2EA3F2">
<link rel="icon" type="image/png" href="/assets/icon.png">
<link rel="stylesheet" href="/colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="motion.css">
<style>
  /* Page-level extras */
  html { scroll-behavior: smooth; }
</style>
</head>
<body>
  <div class="scroll-progress" id="scroll-progress" aria-hidden="true"></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://unpkg.com/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <script type="text/babel" src="Atoms.jsx"></script>
  <script type="text/babel" src="CoastalMap.jsx"></script>
  <script type="text/babel" src="Home1.jsx"></script>
  <script type="text/babel" src="Home2.jsx"></script>
  <script type="text/babel" src="Extras.jsx"></script>
  <script type="text/babel" src="LotOwners.jsx"></script>
  <script type="text/babel" src="Pages.jsx"></script>

  <script type="text/babel">

const { useState, useEffect } = React;

// Wire GSAP ScrollTrigger globally
if (window.gsap && window.ScrollTrigger) gsap.registerPlugin(ScrollTrigger);

// ==================================================================
// Word splitter — wraps every word in <span class="word"> for stagger.
// Idempotent: only splits if not already split.
// ==================================================================
function splitWords(el) {
  if (!el || el.dataset.wordSplit === '1') return;
  // Walk children: keep nested elements (like <span class="serif-italic">) intact,
  // but split their text content into words.
  const walk = (node) => {
    const result = [];
    node.childNodes.forEach((child) => {
      if (child.nodeType === Node.TEXT_NODE) {
        const text = child.textContent;
        const tokens = text.split(/(\s+)/); // keep whitespace
        tokens.forEach((tok) => {
          if (!tok) return;
          if (/^\s+$/.test(tok)) {
            result.push(document.createTextNode(tok));
          } else {
            const span = document.createElement('span');
            span.className = 'word';
            span.textContent = tok;
            result.push(span);
          }
        });
      } else if (child.nodeType === Node.ELEMENT_NODE) {
        // Recurse: split words inside this element too, then push it as-is
        walk(child);
        result.push(child);
      }
    });
    // Replace contents
    while (node.firstChild) node.removeChild(node.firstChild);
    result.forEach((n) => node.appendChild(n));
  };
  walk(el);
  el.dataset.wordSplit = '1';
}

// ==================================================================
// Animated counter — counts from 0 to target with easing
// ==================================================================
function animateCounter(el) {
  if (el.dataset.counted === '1') return;
  el.dataset.counted = '1';
  const target = parseFloat(el.dataset.target);
  const suffix = el.dataset.suffix || '';
  const isInt = Number.isInteger(target);
  const duration = 1800;
  const start = performance.now();
  const ease = (t) => 1 - Math.pow(1 - t, 3); // ease-out-cubic
  const step = (now) => {
    const p = Math.min((now - start) / duration, 1);
    const v = target * ease(p);
    const display = isInt ? Math.round(v).toLocaleString() : v.toFixed(1);
    el.textContent = display + suffix;
    if (p < 1) requestAnimationFrame(step);
  };
  requestAnimationFrame(step);
}

// ==================================================================
// Magnetic button — pulls towards cursor within a radius
// ==================================================================
function attachMagnetic(el) {
  if (el.dataset.magneticAttached === '1') return;
  el.dataset.magneticAttached = '1';
  const radius = 80;
  const onMove = (e) => {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const dist = Math.hypot(dx, dy);
    if (dist < radius * 1.6) {
      const strength = Math.min(1, (radius * 1.6 - dist) / (radius * 1.6));
      el.style.transform = `translate(${dx * 0.25 * strength}px, ${dy * 0.25 * strength}px)`;
    } else {
      el.style.transform = 'translate(0,0)';
    }
  };
  const onLeave = () => { el.style.transform = 'translate(0,0)'; };
  window.addEventListener('mousemove', onMove);
  el.addEventListener('mouseleave', onLeave);
}

function setupAnimations() {
  if (!window.gsap || !window.ScrollTrigger) {
    // No GSAP — just reveal everything immediately.
    document.body.classList.remove('js-reveal');
    return;
  }
  document.body.classList.add('js-reveal');
  // Clear any previous triggers (route change)
  ScrollTrigger.getAll().forEach(t => t.kill());
  gsap.killTweensOf('.reveal, [data-parallax], [data-float]');

  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReduced) {
    gsap.set('.reveal', { opacity: 1, y: 0 });
    return;
  }

  // -------- Scroll progress bar --------
  const progressEl = document.getElementById('scroll-progress');
  if (progressEl) {
    ScrollTrigger.create({
      start: 0, end: 'max',
      onUpdate: (self) => {
        progressEl.style.width = (self.progress * 100).toFixed(2) + '%';
      },
    });
  }

  // -------- Word reveals on headings --------
  document.querySelectorAll('[data-word-reveal]').forEach((el) => {
    splitWords(el);
    ScrollTrigger.create({
      trigger: el,
      start: 'top 92%',
      once: true,
      onEnter: () => {
        const words = el.querySelectorAll('.word');
        gsap.to(words, {
          opacity: 1,
          y: 0,
          rotate: 0,
          duration: 0.9,
          ease: 'power3.out',
          stagger: 0.06,
        });
      },
    });
  });

  // -------- Mask reveals (single-line eyebrows etc) --------
  document.querySelectorAll('[data-eyebrow-reveal]').forEach((el) => {
    ScrollTrigger.create({
      trigger: el, start: 'top 95%', once: true,
      onEnter: () => el.classList.add('in'),
    });
  });

  // -------- Magnetic CTAs --------
  document.querySelectorAll('[data-magnetic]').forEach(attachMagnetic);

  // -------- Cloud parallax (hero) --------
  const cloudsSlow = document.querySelector('[data-cloud-slow]');
  const cloudsFast = document.querySelector('[data-cloud-fast]');
  if (cloudsSlow) {
    gsap.to(cloudsSlow, {
      xPercent: -10, ease: 'none',
      scrollTrigger: { trigger: '[data-hero]', start: 'top top', end: 'bottom top', scrub: true },
    });
  }
  if (cloudsFast) {
    gsap.to(cloudsFast, {
      xPercent: 15, ease: 'none',
      scrollTrigger: { trigger: '[data-hero]', start: 'top top', end: 'bottom top', scrub: true },
    });
  }

  // -------- Mouse parallax on hero phone holder --------
  const holder = document.querySelector('[data-hero-phone-holder]');
  if (holder && window.matchMedia('(hover: hover)').matches) {
    const onMove = (e) => {
      const rect = holder.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const dx = (e.clientX - cx) / rect.width;
      const dy = (e.clientY - cy) / rect.height;
      holder.style.transition = 'transform 600ms var(--ease-tide)';
      holder.style.transform = `translate(${dx * -14}px, ${dy * -10}px)`;
    };
    window.addEventListener('mousemove', onMove);
  }

  // -------- Card stagger groups --------
  document.querySelectorAll('[data-card-stagger]').forEach((group) => {
    ScrollTrigger.create({
      trigger: group, start: 'top 88%', once: true,
      onEnter: () => group.classList.add('in'),
    });
  });

  // -------- How-it-works connector track progress --------
  document.querySelectorAll('[data-connector]').forEach((track) => {
    const section = track.closest('section');
    if (!section) return;
    ScrollTrigger.create({
      trigger: section, start: 'top 70%', end: 'bottom 40%',
      onUpdate: (self) => {
        track.style.setProperty('--track-progress', (self.progress * 100).toFixed(1) + '%');
      },
    });
  });

  // -------- Animated counters --------
  document.querySelectorAll('[data-counter]').forEach((el) => {
    ScrollTrigger.create({
      trigger: el, start: 'top 90%', once: true,
      onEnter: () => animateCounter(el),
    });
  });

  // 1. Reveal-on-scroll: fade + rise.
  document.querySelectorAll('.reveal').forEach((el) => {
    const d = parseFloat(el.dataset.delay);
    const delay = (Number.isFinite(d) ? d : 0) * 0.08;
    gsap.to(el, {
      opacity: 1, y: 0, scale: 1,
      duration: 0.9, ease: 'power3.out', delay,
      scrollTrigger: { trigger: el, start: 'top 95%', once: true },
      onComplete: () => {
        el.classList.add('in-view');
        // Drop inline styles now that .in-view locks the revealed state via CSS
        gsap.set(el, { clearProps: 'transform,opacity,scale' });
      },
    });
  });
  ScrollTrigger.refresh();

  // -------- Story section: which beat is active --------
  // On every scroll, pick the beat whose center is closest to viewport center.
  const storySection = document.querySelector('[data-story-section]');
  if (storySection) {
    const beats = storySection.querySelectorAll('[data-beat]');
    const frames = storySection.querySelectorAll('[data-story-frame]');
    const dots = storySection.querySelectorAll('[data-story-dot]');
    const atmosphere = storySection.querySelector('[data-story-atmosphere]');
    const atmosphereBgs = [
      'radial-gradient(80% 70% at 30% 30%, rgba(255,107,92,0.4) 0%, transparent 70%)',
      'radial-gradient(90% 80% at 70% 50%, rgba(245,158,11,0.35) 0%, transparent 70%)',
      'radial-gradient(80% 70% at 40% 60%, rgba(31,184,122,0.35) 0%, transparent 70%)',
      'radial-gradient(90% 80% at 60% 50%, rgba(246,199,64,0.4) 0%, transparent 70%)',
    ];

    let currentActive = -1;
    const setActive = (idx) => {
      if (idx === currentActive) return;
      currentActive = idx;
      frames.forEach((f, i) => {
        f.style.opacity = i === idx ? '1' : '0';
      });
      dots.forEach((d, i) => {
        d.style.width = i === idx ? '32px' : '6px';
        d.style.background = i === idx ? 'var(--bs-sun)' : 'rgba(255,255,255,0.28)';
      });
      if (atmosphere && atmosphereBgs[idx]) {
        atmosphere.style.transition = 'background 700ms var(--ease-tide)';
        atmosphere.style.background = atmosphereBgs[idx];
      }
    };

    const update = () => {
      const vh = window.innerHeight;
      const center = vh / 2;
      let best = 0, bestDist = Infinity;
      beats.forEach((beat, i) => {
        const r = beat.getBoundingClientRect();
        // Only consider if beat overlaps viewport at all
        if (r.bottom < 0 || r.top > vh) return;
        const beatCenter = (r.top + r.bottom) / 2;
        const dist = Math.abs(beatCenter - center);
        if (dist < bestDist) { bestDist = dist; best = i; }
      });
      if (bestDist !== Infinity) setActive(best);
    };

    // Initial + on every scroll/resize
    update();
    window.addEventListener('scroll', update, { passive: true });
    window.addEventListener('resize', update);
  }


  // 2. Hero phone parallax
  document.querySelectorAll('[data-parallax]').forEach((el) => {
    const amt = parseFloat(el.dataset.parallax) || 60;
    gsap.to(el, {
      y: -amt, ease: 'none',
      scrollTrigger: { trigger: el, start: 'top bottom', end: 'bottom top', scrub: true }
    });
  });

  // 3. Floating pin cards — gentle continuous drift
  document.querySelectorAll('[data-float]').forEach((el, i) => {
    gsap.to(el, {
      y: '+=10', duration: 3 + i * 0.5,
      yoyo: true, repeat: -1, ease: 'sine.inOut'
    });
  });

  // 4. Hero sun glow gentle pulse
  document.querySelectorAll('[data-sun]').forEach((el) => {
    gsap.to(el, { scale: 1.06, duration: 4, yoyo: true, repeat: -1, ease: 'sine.inOut', transformOrigin: 'center' });
  });
}

function App() {
  // Route from hash so refresh keeps you on the page
  const initial = (window.location.hash || '#home').slice(1);
  const [route, setRoute] = useState(initial);
  const go = (r) => {
    setRoute(r);
    window.location.hash = r;
    window.scrollTo({ top: 0, behavior: 'instant' });
  };
  useEffect(() => {
    const onHash = () => setRoute((window.location.hash || '#home').slice(1));
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // Reveal-on-scroll + GSAP animations (re-run on route change)
  useEffect(() => {
    // Wait one paint so DOM is in place
    const id = requestAnimationFrame(() => setupAnimations());
    return () => cancelAnimationFrame(id);
  }, [route]);

  const screenLabels = {
    home: '01 Home',
    'lot-owners': '02 Lot Owners',
    support: '03 Support',
    privacy: '04 Privacy',
    terms: '05 Terms'
  };

  return (
    <div data-screen-label={screenLabels[route] || '01 Home'}>
          {/* Route switcher (UI-kit-only) */}
          <div className="route-switcher" role="tablist" aria-label="UI kit page switcher" data-comment-anchor="350203fda0-div-39-11">
            <div className="route-switcher__buttons">
            {[
        ['home', 'Home'],
        ['lot-owners', 'Lot owners'],
        ['support', 'Support'],
        ['privacy', 'Privacy'],
        ['terms', 'Terms']].
        map(([k, l]) =>
        <button key={k} className={route === k ? 'active' : ''} onClick={() => go(k)}>{l}</button>
        )}
            </div>
          </div>

          <Nav current={route} go={go} />
          {route === 'home' && <HomePage go={go} />}
          {route === 'lot-owners' && <LotOwnersPage go={go} />}
          {route === 'support' && <SupportPage go={go} />}
          {route === 'privacy' && <PrivacyPage go={go} />}
          {route === 'terms' && <TermsPage go={go} />}
          <Footer go={go} />
        </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
